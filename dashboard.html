<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - SITTA-UT</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body onload="checkLogin(); greeting()">

<!-- SIDEBAR -->
<div class="sidebar">
  <div style="display:flex; align-items:center; justify-content:center; gap:8px; padding:10px 0;">
    <img src="assets/img/logo-ut.png" alt="Logo UT" style="width:35px; height:35px; object-fit:contain;">
    <h3 style="margin:0; color:#fff;">SITTA-UT</h3>
  </div>

  <a href="stok.html"><i class="fa-solid fa-boxes-stacked"></i> Stok Bahan Ajar</a>
  <a href="tracking.html"><i class="fa-solid fa-truck"></i> Tracking Pengiriman</a>

  <div class="menu">
    <a href="#"><i class="fa-solid fa-chart-bar"></i> Laporan ▸</a>
    <div class="submenu">
      <a href="#"><i class="fa-solid fa-eye"></i> Monitoring Progress DO</a>
      <a href="#"><i class="fa-solid fa-file-alt"></i> Rekap Bahan Ajar</a>
    </div>
  </div>

  <a href="#"><i class="fa-solid fa-folder"></i> Histori Transaksi</a>

  <button class="btn-logout" onclick="openLogoutModal()">
    <i class="fas fa-sign-out-alt"></i> Logout
  </button>
</div>

<!-- CONTENT -->
<div class="content">

  <div class="navbar">
    <span id="greet"></span>
  </div>

  <!-- WELCOME -->
  <div class="card">
    <h3>Selamat Datang di Sistem SITTA-UT</h3>
    <p>Kelola pemesanan bahan ajar dengan mudah.</p>
  </div>

  <!-- MENU CEPAT -->
  <div class="card">
    <h3>Menu Cepat</h3>
    <button class="menu-btn" onclick="location.href='stok.html'">
      <i class="fa-solid fa-boxes-stacked"></i> Stok
    </button>
    <button class="menu-btn" onclick="location.href='tracking.html'">
      <i class="fa-solid fa-truck"></i> Tracking
    </button>
  </div>

</div>

<script src="js/dataBahanAjar.js"></script>
<script src="js/script.js"></script>

</body>
</html>
