<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body onload="checkLogin(); greeting()">

<div class="sidebar">
  <h3 style="text-align:center;">DashBoard SITTA-UT</h3>
  <a href="stok.html">📦 Informasi Bahan Ajar</a>
  <a href="tracking.html">🚚 Tracking Pengiriman</a>

   <div class="menu">
    <a href="#">📊 Laporan ▸</a>
    <div class="submenu">
      <a href="#">Monitoring Progress DO</a>
      <a href="#">Rekap Bahan Ajar</a>
    </div>
  </div>
  <a href="#">📁 Histori Transaksi Bahan Ajar</a>

  <button onclick="logout()" class="logout-btn">
    <i class="fas fa-sign-out-alt"></i> Logout
  </button>
</div>

<div class="content">
  <div class="navbar">
    <span id="greet"></span>
</div>

<div class="card">
    <h3>Selamat Datang di Sistem SITTA-UT</h3>
    <p>Kelola pemesanan bahan ajar dengan mudah.</p>
</div>

<div class="card">
    <h3>Menu Cepat</h3>
    <button onclick="location.href='stok.html'" class="menu-btn">Stok</button>
    <button onclick="location.href='tracking.html'" class="menu-btn">Tracking</button>
</div>

<div id="logoutModal" class="modal-base modal-js">
  <div class="modal-content">

    <span class="modal-close" onclick="closeLogoutModal()">&times;</span>

    <div style="text-align:center;">
      <div style="font-size:40px;">⚠️</div>
      <h3>Konfirmasi Logout</h3>
      <p>Apakah anda ingin keluar?</p>

      <button onclick="confirmLogout()" class="btn-yes">Ya</button>
      <button onclick="closeLogoutModal()" class="btn-no">Tidak</button>
    </div>

  </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
